aid: take-two-interactive-software
name: Take-Two Interactive Software
description: >-
  Take-Two Interactive Software, Inc. is a leading developer, publisher, and
  marketer of interactive entertainment. The company operates through its
  publishing labels: Rockstar Games (Grand Theft Auto, Red Dead Redemption),
  2K (NBA 2K, Borderlands, Civilization, BioShock, Mafia), Private Division,
  and Zynga (mobile games). Headquartered in New York City, Take-Two is a
  Fortune 500 company with studios across North America, Europe, and Asia.
  No public developer API is currently available.
